name: tests

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly, to catch an fsautocomplete release changing behaviour.
    - cron: "0 6 * * 1"

jobs:
  unit:
    # Drives a scripted fake LSP server, so it needs neither .NET nor fsautocomplete.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip pytest
      - run: python -m pytest -v

  integration:
    # Real fsautocomplete against tests/fixtures/SampleProject. Only on demand
    # and on the weekly schedule: it is slow and its job is catching FSAC drift.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet tool install -g fsautocomplete
      - run: python -m pip install --upgrade pip pytest
      - name: Run integration tests
        env:
          FSAC_PATH: /home/runner/.dotnet/tools/fsautocomplete
        run: python -m pytest -m integration -v
